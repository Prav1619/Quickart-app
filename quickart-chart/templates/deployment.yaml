apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name | default "quickart" }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: {{ .Values.app.name | default "quickart" }}

  template:
    metadata:
      labels:
        app: {{ .Values.app.name | default "quickart" }}

    spec:
      containers:
        - name: {{ .Values.app.name | default "quickart" }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.service.port }}
