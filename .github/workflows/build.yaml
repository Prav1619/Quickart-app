name: Smart CI - Quickart-update-image

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  detect-build-and-create-pr:
    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # Checkout Application Repository
      # ==========================================
      - name: Checkout application repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ==========================================
      # Detect Changed Files
      # ==========================================
      - name: Detect changed files
        id: changes
        run: |
          BEFORE=${{ github.event.before }}
          AFTER=${{ github.sha }}

          if git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            FILES=$(git diff --name-only "$BEFORE" "$AFTER")
          else
            FILES=""
          fi

          echo "Changed files:"
          echo "$FILES"

          echo "FILES<<EOF" >> $GITHUB_ENV
          echo "$FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ==========================================
      # Determine Impacted Services
      # ==========================================
      - name: Determine impacted services
        run: |
          SERVICES=""

          # Shared dependency change
          if echo "$FILES" | grep -E 'pom.xml|common-lib/'; then
            SERVICES="product-service user-service order-service"

          else
            echo "$FILES" | grep -q "^product-service/" && SERVICES="$SERVICES product-service"

            echo "$FILES" | grep -q "^user-service/" && SERVICES="$SERVICES user-service"

            echo "$FILES" | grep -q "^order-service/" && SERVICES="$SERVICES order-service"
          fi

          SERVICES=$(echo $SERVICES | xargs)

          echo "Detected services: $SERVICES"

          echo "SERVICES=$SERVICES" >> $GITHUB_ENV

      # ==========================================
      # Stop Workflow If No Services Changed
      # ==========================================
      - name: Skip if no impacted services
        run: |
          if [ -z "$SERVICES" ]; then
            echo "No impacted services detected."

            echo "Skipping pipeline."

            exit 0
          fi

      # ==========================================
      # Setup Java
      # ==========================================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ==========================================
      # Build Impacted Services
      # ==========================================
      - name: Build impacted services
        run: |
          echo "Building services: $SERVICES"

          mvn clean package \
            -pl $(echo "$SERVICES" | tr ' ' ',') \
            -am

      # ==========================================
      # Generate Image Tag
      # ==========================================
      - name: Generate image tag
        run: |
          TAG=$(echo "${{ github.sha }}" | cut -c1-7)

          echo "TAG=$TAG" >> $GITHUB_ENV

          echo "Using image tag: $TAG"

      # ==========================================
      # Login to DockerHub
      # ==========================================
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ==========================================
      # Build and Push Docker Images
      # ==========================================
      - name: Build and push Docker images
        run: |
          for svc in $SERVICES; do

            echo "=================================="
            echo "Building Docker image for $svc"
            echo "=================================="

            docker build \
              -t prav1619/$svc:$TAG \
              ./$svc

            docker tag prav1619/$svc:$TAG prav1619/$svc:latest

            docker push prav1619/$svc:$TAG

            docker push prav1619/$svc:latest

          done

      # ==========================================
      # Clone Deployment Repository
      # ==========================================
      - name: Clone deployment repository
        run: |
          git clone https://${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/Prav1619/Quickart-deploy.git

      # ==========================================
      # Update Only Impacted Helm Values Files
      # ==========================================
      - name: Update Helm values files
        run: |
          cd Quickart-deploy

          for svc in $SERVICES; do

            FILE="environments/prod/$svc.yaml"

            echo "Updating image tag in $FILE"

            sed -i "s/tag:.*/tag: \"$TAG\"/" $FILE

            echo "Updated file:"
            cat $FILE

          done

      # ==========================================
      # Commit and Push Changes
      # ==========================================
      - name: Commit and push changes
        run: |
          cd Quickart-deploy

          git config user.name "github-actions"

          git config user.email "github-actions@github.com"

          BRANCH=update-image-$TAG

          echo "Using branch: $BRANCH"

          git checkout -b $BRANCH

          git add .

          git commit -m "Update image tags to $TAG"

          git push origin $BRANCH

      # ==========================================
      # Verify GitHub CLI
      # ==========================================
      - name: Verify GitHub CLI
        run: |
          gh --version

      # ==========================================
      # Create Pull Request
      # ==========================================
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
        run: |
          cd Quickart-deploy

          gh pr create \
            --title "Update image tags to $TAG" \
            --body "Automated image tag update from GitHub Actions pipeline" \
            --base main \
            --head update-image-$TAG
