name: Multi-Service CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [product-service, order-service, user-service]

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name quickart-eks --region $AWS_REGION

    - name: Docker Login
      run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build & Push Image
      run: |
        docker build -t prav1619/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}
        docker push prav1619/${{ matrix.service }}:${{ github.sha }}

    - name: Deploy to EKS
      run: |
        helm upgrade --install ${{ matrix.service }} ./quickart-chart \
        -f quickart-chart/values/${{ matrix.service }}.yaml \
        --set image.tag=${{ github.sha }} \
        -n quickart --create-namespace
