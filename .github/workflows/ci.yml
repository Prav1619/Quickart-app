name: My CI workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build & Test
        run: mvn clean package
      
      - name: Debug targets
        run: find . -type d -name target
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-services
          path: "**/target/*.jar"
