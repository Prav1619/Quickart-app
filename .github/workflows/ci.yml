name: Smart CI - Quickart

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'product-service/**'
      - 'user-service/**'
      - 'order-service/**'
      - 'pom.xml'
    paths-ignore:
      - '**/*.md'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------
      # 1. Checkout full repo history
      # ----------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------------
      # 2. Setup Java
      # ----------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # ----------------------------------
      # 3. Cache Maven dependencies
      # ----------------------------------
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      # ----------------------------------
      # 4. Detect changed files
      # ----------------------------------
      - name: Detect changes
        run: |
          BEFORE=${{ github.event.before }}
          AFTER=${{ github.sha }}

          echo "Before: $BEFORE"
          echo "After:  $AFTER"

          if git cat-file -e $BEFORE^{commit} 2>/dev/null; then
            FILES=$(git diff --name-only $BEFORE $AFTER)
          else
            echo "Invalid BEFORE commit → fallback"
            FILES=""
          fi

          echo "Changed files:"
          echo "$FILES"

          echo "FILES=$FILES" >> $GITHUB_ENV

      # ----------------------------------
      # 5. Determine impacted services
      # ----------------------------------
      - name: Determine impacted services
        run: |
          SERVICES=""

          if echo "$FILES" | grep -E 'pom.xml|k8s/|scripts/|terraform/'; then
            SERVICES="product-service user-service order-service"
          else
            echo "$FILES" | grep -q "product-service/" && SERVICES="$SERVICES product-service"
            echo "$FILES" | grep -q "user-service/" && SERVICES="$SERVICES user-service"
            echo "$FILES" | grep -q "order-service/" && SERVICES="$SERVICES order-service"
          fi

          if [ -z "$SERVICES" ]; then
            echo "No service detected → fallback to full build"
            SERVICES="product-service user-service order-service"
          fi

          echo "Final impacted services: $SERVICES"
          echo "SERVICES=$SERVICES" >> $GITHUB_ENV

      # ----------------------------------
      # 6. Build
      # ----------------------------------
      - name: Build impacted services
        run: |
          echo "Building services: $SERVICES"
          mvn clean package -pl $(echo $SERVICES | tr ' ' ',') -am

      # ----------------------------------
      # 7. Verify outputs
      # ----------------------------------
      - name: List generated JARs
        run: find . -name "*.jar"

      # ----------------------------------
      # 8. Upload artifacts
      # ----------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: microservices-artifacts
          path: "**/target/*.jar"
