name: Enterprise Microservices CI/CD

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:

#########################################################
# DETECT CHANGED SERVICES
#########################################################

  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      product: ${{ steps.filter.outputs.product }}
      order: ${{ steps.filter.outputs.order }}
      user: ${{ steps.filter.outputs.user }}

    steps:

      - name: Checkout quickart-app Repo
        uses: actions/checkout@v4

      - name: Detect Changed Services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            product:
              - 'product-service/**'

            order:
              - 'order-service/**'

            user:
              - 'user-service/**'

#########################################################
# BUILD & PUSH ONLY CHANGED SERVICES
#########################################################

  build-services:
    needs: detect-changes

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - product-service
          - order-service
          - user-service

    steps:

      #################################################
      # CHECKOUT APPLICATION REPO
      #################################################

      - name: Checkout quickart-app Repo
        uses: actions/checkout@v4

      #################################################
      # DETERMINE CHANGED SERVICE
      #################################################

      - name: Check Whether Service Changed
        id: changed
        run: |

          if [[ "${{ matrix.service }}" == "product-service" ]]; then
            echo "changed=${{ needs.detect-changes.outputs.product }}" >> $GITHUB_OUTPUT

          elif [[ "${{ matrix.service }}" == "order-service" ]]; then
            echo "changed=${{ needs.detect-changes.outputs.order }}" >> $GITHUB_OUTPUT

          elif [[ "${{ matrix.service }}" == "user-service" ]]; then
            echo "changed=${{ needs.detect-changes.outputs.user }}" >> $GITHUB_OUTPUT
          fi

      #################################################
      # SETUP JAVA
      #################################################

      - name: Setup Java
        if: steps.changed.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      #################################################
      # BUILD SPRINGBOOT APPLICATION
      #################################################

      - name: Build SpringBoot App
        if: steps.changed.outputs.changed == 'true'
        working-directory: ${{ matrix.service }}
        run: |
          mvn clean package -DskipTests

      #################################################
      # LOGIN TO DOCKER HUB
      #################################################

      - name: DockerHub Login
        if: steps.changed.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      #################################################
      # BUILD DOCKER IMAGE
      #################################################

      - name: Build Docker Image
        if: steps.changed.outputs.changed == 'true'
        working-directory: ${{ matrix.service }}
        run: |
          docker build \
          -t $DOCKERHUB_USERNAME/${{ matrix.service }}:$IMAGE_TAG \
          .

      #################################################
      # PUSH DOCKER IMAGE
      #################################################

      - name: Push Docker Image
        if: steps.changed.outputs.changed == 'true'
        run: |
          docker push \
          $DOCKERHUB_USERNAME/${{ matrix.service }}:$IMAGE_TAG

#########################################################
# UPDATE GITOPS REPO
#########################################################

  update-gitops:
    needs:
      - detect-changes
      - build-services

    runs-on: ubuntu-latest

    steps:

      #################################################
      # CHECKOUT APPLICATION REPO
      #################################################

      - name: Checkout quickart-app Repo
        uses: actions/checkout@v4

      #################################################
      # CHECKOUT GITOPS REPO
      #################################################

      - name: Checkout Quickart-deploy Repo
        uses: actions/checkout@v4
        with:
          repository: Prav1619/Quickart-deploy
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: Quickart-deploy

      #################################################
      # INSTALL YQ
      #################################################

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      #################################################
      # DEBUG REPOS
      #################################################

      - name: Verify Repositories
        run: |
          echo "Current Workspace:"
          pwd

          echo "Files:"
          ls -la

      #################################################
      # UPDATE PRODUCT SERVICE IMAGE TAG
      #################################################

      - name: Update Product Service values.yaml
        if: needs.detect-changes.outputs.product == 'true'
        run: |
          cd Quickart-deploy

          yq -i '
          .image.repository = "'"$DOCKERHUB_USERNAME"'/product-service" |
          .image.tag = "'"$IMAGE_TAG"'"
          ' charts/product-service/values.yaml

      #################################################
      # UPDATE ORDER SERVICE IMAGE TAG
      #################################################

      - name: Update Order Service values.yaml
        if: needs.detect-changes.outputs.order == 'true'
        run: |
          cd Quickart-deploy

          yq -i '
          .image.repository = "'"$DOCKERHUB_USERNAME"'/order-service" |
          .image.tag = "'"$IMAGE_TAG"'"
          ' charts/order-service/values.yaml

      #################################################
      # UPDATE USER SERVICE IMAGE TAG
      #################################################

      - name: Update User Service values.yaml
        if: needs.detect-changes.outputs.user == 'true'
        run: |
          cd Quickart-deploy

          yq -i '
          .image.repository = "'"$DOCKERHUB_USERNAME"'/user-service" |
          .image.tag = "'"$IMAGE_TAG"'"
          ' charts/user-service/values.yaml

      #################################################
      # VERIFY UPDATED VALUES
      #################################################

      - name: Verify Updated Files
        run: |
          cd Quickart-deploy

          find charts -name values.yaml | xargs cat

      #################################################
      # COMMIT & PUSH CHANGES
      #################################################

      - name: Commit and Push Changes
        run: |
          cd Quickart-deploy

          git config user.email "github-actions@github.com"
          git config user.name "github-actions"

          git add .

          git commit -m "Update image tags to $IMAGE_TAG" \
          || echo "No changes to commit"

          git push
