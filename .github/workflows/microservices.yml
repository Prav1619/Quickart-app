name: Build and Push Microservices

on:
  push:
    branches:
      - main
      - prod

jobs:

  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      product: ${{ steps.filter.outputs.product }}
      order: ${{ steps.filter.outputs.order }}
      user: ${{ steps.filter.outputs.user }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Changed Services
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            product:
              - 'product-service/**'

            order:
              - 'order-service/**'

            user:
              - 'user-service/**'

  build-product:
    needs: detect-changes
    if: needs.detect-changes.outputs.product == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Product Service
        working-directory: product-service
        run: mvn clean package -DskipTests

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        working-directory: product-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/product-service:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/product-service:${{ github.sha }}

  build-order:
    needs: detect-changes
    if: needs.detect-changes.outputs.order == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Order Service
        working-directory: order-service
        run: mvn clean package -DskipTests

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        working-directory: order-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/order-service:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/order-service:${{ github.sha }}

  build-user:
    needs: detect-changes
    if: needs.detect-changes.outputs.user == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build User Service
        working-directory: user-service
        run: mvn clean package -DskipTests

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        working-directory: user-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ github.sha }}
